intents:  
  EnrollGraduateStudentInCourse:
    preconditions:
      classes:
        graduate_course: GraduateCourse
      slots:
        graduate_course_id: id
      cardinality: 4
      description: 'Subscribes a graduate student (with id and name) to an existing graduate course'
    postconditions:
      classes:
        graduate_student: GraduateStudent
      slots:
        graduate_student_id: id
        graduate_student_name: str
      triples:
      - [graduate_student_id, type, GraduateStudent]
      - [graduate_student_id, takesCourse, graduate_course_id]
      - [graduate_student_id, name, graduate_student_name]

  GraduateStudent:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 3
      description: 'Makes a NEW student (id and name) graduate from a NEW department (id and name), included in a NEW university (id and name)'
    postconditions:
      classes:
        graduate_student: GraduateStudent
        department: Department
        university: University
      slots:
        graduate_student_id: id
        department_id: id
        university_id: id
        graduate_student_name: str,
        department_name: str,
        university_name: str
      triples:
      - [graduate_student_id, type, GraduateStudent]
      - [department_id, type, Department]
      - [university_id, type, University]
      - [graduate_student_id, memberOf, department_id]
      - [graduate_student_id, undergraduateDegreeFrom, university_id]
      - [department_id, subOrganizationOf, university_id]
      - [graduate_student_id, name, graduate_student_name]
      - [department_id, name, department_name]
      - [university_id, name, university_name]

  SendPublication:
    preconditions:
      classes:
        assistant_professor: assistantProfessor
      slots:
        assistant_professor_id: id
      cardinality: 4
      description: 'Makes and existing assistant professor send a NEW publication, with its id, title, and publication date'
    postconditions:
      classes:
        publication: Publication
      slots:
        publication_id: id
        publication_title: str
        publication_date: date
      triples:
      - [publication_id, type, Publication]
      - [publication_id, publicationAuthor, assistant_professor_id]
      - [publication_id, publicationTitle, publication_title]
      - [publication_id. publicationDate, publication_date]

  HireProfessor:
    preconditions:
      classes:
        department: Department
      slots:
        department_id: id
      cardinality: 3
      description: 'Hires a NEW professor (id, name, email, and telephone) in an existing department'
    postconditions:
      classes:
        professor: Professor
      slots:
        professor_id: id
        profssor_email: str
        professor_name: str
        professor_telephone: str
      triples:
      - [professor_id, type, Professor]
      - [professor_id, worksFor, department_id]
      - [professor_id, emailAddress, profssor_email]
      - [professor_id, name, professor_name]
      - [professor_id, telephone, professor_telephone]

  ListMember:
    preconditions:
      classes:
        department: Department
      slots:
        department_id: id
      cardinality: 2
      description: 'Makes a NEW person (id and name) a member of an existing department'
    postconditions:
      classes:
        person: Person
      slots:
        person_id: id
        person_name: str
      triples:
      - [person_id, type, Person]
      - [person_id, memberOf, department_id]
      - [person_id, name, person_name]

  IntroduceStudent:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 2
      description: 'Introduces NEW a student (id and name)'
    postconditions:
      classes:
        student: Student
      slots:
        student_id: id
        student_name: str
      triples:
      - [student_id, type, Student]
      - [student_id, name, student_name]

  TakeCourseOfProfessor:
    preconditions:
      classes:
        associate_professor: associateProfessor
      slots:
        associate_professor_id: id
      cardinality: 3
      description: 'Subscribe NEW a student (id and name), to a NEW course (id and name) held by an existing associate professor'
    postconditions:
      classes:
        course: Course
        student: Student
      slots:
        course_id: id
        student_id: id
        course_name: str
        student_name: str
      triples:
      - [course_id, type, Course]
      - [student_id, type, Student]
      - [student_id, takesCourse, course_id]
      - [associate_professor_id, teacherOf, course_id]
      - [course_id, name, course_name]
      - [student_id, name, student_name]

  EnrollStudent:
    preconditions:
      classes:
        university: University
      slots:
        university_id: id
      cardinality: 2
      description: 'Enrolls a NEW student (id and name) in a NEW department (id and name) of an already existing university'
    postconditions:
      classes:
        student: Student
        department: Department
      slots:
        student_id: id
        department_id: id
        department_name: str
        student_name: str
        student_email: str
      triples:
      - [student_id, type, Student]
      - [department_id, type, Department]
      - [student_id, memberOf, department_id]
      - [department_id, subOrganizationOf, university_id]
      - [student_id, emailAddress, student_email]
      - [student_id, name, student_name]
      - [department_id, name, department_name]

  TakeCourseOfAdvisor:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 3
      description: 'Enrolls a NEW student (id and name) in a NEW course (id and name) of their NEW advisor professor (id and name)'
    postconditions:
      classes:
        student: Student
        faculty: Faculty
        course: Course
      slots:
        student_id: id
        faculty_id: id
        course_id: id
        student_name: str
        faculty_name: str
        course_name: str
      triples:
      - [student_id, type, Student]
      - [faculty_id, type, Faculty]
      - [course_id, type, Course]
      - [student_id, advisor, faculty_id]
      - [student_id, takesCourse, course_id]
      - [faculty_id, teacherOf, course_id]
      - [student_id, name, student_name]
      - [faculty_id, name, faculty_name]
      - [course_id, name, course_name]

  TakeCourse:
    preconditions:
      classes:
        graduate_course: GraduateCourse
      slots:
        graduate_course_id: id
      cardinality: 4
      description: 'Enrolls NEW a student (id and name) in a graduate course'
    postconditions:
      classes:
        student: Student
      slots:
        student_id: id
        student_name: str
      triples:
      - [student_id, type, Student]
      - [student_id, takesCourse, graduate_course_id]
      - [student_id, name, student_name]

  CreateResearchGroup:
    preconditions:
      classes:
        university: University
      slots:
        university_id: id
      cardinality: 3
      description: 'Creates a NEW research group (id and name) within an existing university'
    postconditions:
      classes:
        research_group: ResearchGroup
      slots:
        research_group_id: id
        research_group_name: str
      triples:
      - [research_group_id, type, ResearchGroup]
      - [research_group_id, subOrganizationOf, university_id]
      - [research_group_id, name, research_group_name]

  NominateDepartmentChair:
    preconditions:
      classes:
        university: University
      slots:
        university_id: id
      cardinality: 3
      description: 'Nominates a NEW porfessor as the chair of a NEW department (id and name) within an existing university. Provides the id, name, email, telephone, and office number of the NEW chair professor'
    postconditions:
      classes:
        department: Department
        chair: Chair
      slots:
        department_id: id
        chair_id: id
        department_name: str
        chair_name: str
        chair_email: str
        chair_telephone: str
        chair_office: str
      triples:
      - [department_id, type, Department]
      - [chair_id, type, Chair]
      - [department_id, subOrganizationOf, university_id]
      - [chair_id, worksFor, department_id]
      - [department_id, name, department_name]
      - [chair_id, name, chair_name]
      - [chair_id, email, chair_email]
      - [chair_id, telephone, chair_telephone]
      - [chair_id, officeNumber, chair_office]

  DefineAlumnus:
    preconditions:
      classes:
        university: University
      slots:
        university_id: id
      cardinality: 2
      description: 'Makes a NEW person (id and name) alumnus of an existing university'
    postconditions:
      classes:
        person: Person
      slots:
        person_id: id
        person_name: str
      triples:
      - [person_id, type, Person]
      - [university_id, hasAlumnus, person_id]
      - [person_id, degreeFrom, university_id]
      - [person_id, name, person_name]

  IntroduceUndergraduateStudent:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 2
      description: 'Introduces a NEW graduate student, with its id and name'
    postconditions:
      classes:
        undergraduate_student: UndergraduateStudent
      slots:
        undergraduate_student_id: id
        undergraduate_student_name: str
      triples:
      - [undergraduate_student_id, type, UndergraduateStudent]
      - [undergraduate_student_id, name, undergraduate_student_name]

types:
  id:
    type: 'str'
    pattern: '^\S+$'
    text: 'A string without spaces'

subclasses:
  Professor: [Chair, Director]

precondition_slots: ['graduate_course_id', 'assistant_professor_id', 'department_id', 'associate_professor_id', 'university_id']
repeatable_terms: []

instructions:
  StudentManager:
    inst: ['GraduateStudent', 'IntroduceStudent', 'EnrollStudent', 'IntroduceUndergraduateStudent']
    cardinality: 9
  ProfessorManager:
    inst: ['SendPublication', 'HireProfessor', 'NominateDepartmentChair', 'CreateResearchGroup']
    cardinality: 9
  CourseManager: 
    inst: ['EnrollGraduateStudentInCourse', 'TakeCourseOfProfessor', 'TakeCourse', 'TakeCourseOfAdvisor']
    cardinality: 6
  PeopleManager:
    inst: ['ListMember', 'DefineAlumnus']
    cardinality: 3 