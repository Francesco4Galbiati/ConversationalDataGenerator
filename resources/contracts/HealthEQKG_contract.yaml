intents:
  IntroducePhysician:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 4
      description: "Introduces a new Physician to the context, with its id, NPI, name, surname, gender, specialty,
      credentials"
    postconditions:
      classes: {p: Physician}
      slots: {p_id: id, p_npi: npi, p_name: str, p_surname: str, p_gender: gender, p_specialty: string,
      p_credential: credential}
      triples: [[p_id, type, Physician], [p_id, usNPI, p_npi], [p_id, givenName, p_name],
      [p_id, familyName, p_surname], [p_id, gender, p_gender], [p_id, medicalSpecialty, p_specialty],
      [p_id, credential, p_credential]]

  DefineZipCodeArea:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 1
      description: "Defines a zip code area characterized by a zip code and an unique id (a sequence of 5 digits)"
    postconditions:
      classes: {z: ZipCodeArea}
      slots: {z_id: id, z_zip_code: zipCode}
      triples: [[z_id, type, ZipCodeArea], [z_id, zipCodeValue, z_zipCode]]

  IntroduceFacility:
    preconditions:
      classes: {z: ZipCodeArea}
      slots: {z_id: id}
      cardinality: 3
      description: 'Introduces an Healthcare Facility in an existing zip-code area (identified by the id), with its id,
      name, address, number of employees, short description, number of beds'
    postconditions:
      classes: {f: Facility, z: ZipCodeArea}
      slots: {f_id: id, f_name: str, f_address: str, f_num_of_employees: int, f_description: str, f_num_of_beds: int}
      triples: [[f_id, type, Facility], [f_id, name, f_name], [f_id, address, f_address],
      [f_id, numberOfEmployees, f_num_of_employees], [f_id, abstract, f_description],
      [f_id, numberOfBeds, f_num_of_beds], [f_id, locatedIn, z_id]]

  HirePhysician:
    preconditions:
      classes: {p: Physician, f: Facility}
      slots: {p_id: id, f_id: id}
      cardinality: 3
      description: 'Hires a Physician into a medical facility for a year (creates a JobPlacement entity)'
    postconditions:
      classes: {j: JobPlacement}
      slots: {j_id: id, j_year: int}
      triples: [[j_id, type, JobPlacement], [j_id, hasTimeReference, j_year], [j_id, hasParticipant, p_id],
      [j_id, worksAt, f_id], [p_id, affiliatedHospital, f_id]]

  SpecifyDiploma:
    preconditions:
      classes: {p: Physician}
      slots: {p_id: id}
      cardinality: 3
      description: 'Retrieves the graduation diploma of a Physician, specifying its medical school (id, name,
      short description, faculty size, and number of students), and the year of graduation'
    postconditions:
      classes: {m: MedicalSchool}
      slots: {m_id: id, m_name: str, m_description: str, m_faculty_size: int, m_student_size: int,
      p_graduation_year: int}
      triples: [[m_id, type, MedicalSchool], [m_id, name, m_name], [m_id, abstract, m_description],
      [m_id, facultySize, m_faculty_size], [m_id, numberOfStudents, m_student_size],
      [p_id, graduationYear, p_graduation_year]]

  ListADIScore:
    preconditions:
      classes: {z: ZipCodeArea}
      slots: {z_id: id}
      cardinality: 4
      description: 'Records a measurement of the ADI score of a ZipCodeArea for a certain year, providing also the id 
      of the measurement'
    postconditions:
      classes: {a: ADIScore}
      slots: {a_id: id, a_year: int}
      triples: [[a_id, type, ADIScore], [a_id, scoredIn, a_year], [z_id, hasADI, a_id]]

subclasses: []

types:
  id:
    type: 'str'
    pattern: "r'^S+$'"
    text: 'A string without spaces'
  npi:
    type: 'str'
    pattern: "r'^d{10}$'"
    text: 'A string of 10 digits'
  gender:
    type: 'enum'
    options: ['m', 'f']
    text: "One option between 'm' and 'f'"
  credential:
    type: 'enum'
    options: ['MD', 'DO', 'MBBS']
    text: "One option between 'MD', 'DO', and 'MBBS'"
  zipCode:
    type: 'str'
    pattern: "r'^d{5}$'"
    text: 'A string of 5 digits'

instructions:
  AreaManager: ["DefineZipCodeArea", "IntroduceFacility"]
  PhysicianManager: ["IntroducePhysician", "HirePhysician", "SpecifyDiploma"]
  ScoreManager: ["ListADIScore"]