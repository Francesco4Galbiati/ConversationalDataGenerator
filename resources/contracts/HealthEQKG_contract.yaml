intents:
  FindPhysicianPlacement:
    preconditions:
      classes:
        physician: Physician
        zip_code_area: ZipCodeArea
      slots:
        physician_id: id
        zip_code_area_id: ZipCodeArea
      cardinality: 3
      description: "Finds a new Facility in an existing zip code area in which to hire an existing physician. Provides the facility's id, name, address, abstract (short description), number of beds, number of employees, and the year of placement of the physician"
    postconditions:
      classes:
        facility: Facility
        job_placement: JobPlacement
      slots:
        facility_id: id
        job_placement_id: id
        facility_name: str
        facility_address: str
        facility_abstract: str
        facility_number_of_beds: int
        facility_number_of_employees: int
        job_placement_year: int
      triples:
      - [facility_id, type, Facility]
      - [job_placement_id, type, JobPlacement]
      - [job_placement_id, hasFacility, facility_id]
      - [physician_id, affiliatedHospital, facility_id]
      - [job_placement_id, placementFor, physician_id]
      - [facility_id, name, facility_name]
      - [facility_id, address, facility_address]
      - [facility_id, abstract, facility_abstract]
      - [facility_id, numberOfBeds, facility_number_of_beds]
      - [facility_id, numberOfEmployees, facility_number_of_employees]
      - [job_placement_id, hasTimeReference, job_placement_year]

  ReportPhysicianStudies:
    preconditions:
      classes:
        physician: Physician
      slots:
        physician_id: id
      cardinality: 3
      description: "Provides data about an existing physiscian's studies, introducing the medical school from which they graduated (id, name, abstract (description), faculty size, and number of students), and the physician's graduation year"
    postconditions:
      classes:
        medical_school: MedicalSchool
      slots:
        medical_school_id: id
        graduation_year: int
        school_name: str
        school_abstract: str
        school_faculty_size: int
        school_number_of_student: int
      triples:
      - [medical_school_id, type, MedicalSchool]
      - [physician_id, graduateFrom, medical_school_id]
      - [physician_id, graduationYear, graduation_year]
      - [medical_school_id, name, school_name]
      - [medical_school_id, abstract, school_abstract]
      - [medical_school_id, facultySize, school_faculty_size]
      - [medical_school_id, numberOfStudents, school_number_of_student]

  PhysicianSpecialty:
    preconditions:
      classes:
        physician: Physician
      slots:
        physician_id: id
      cardinality: 4
      description: 'Provides the medical specialty and credentials of an existing physician'
    postconditions:
      classes: {}
      slots:
        physician_credentials: credentials
        physician_medical_specialty: str
      triples:
      - [physician_id, credential, physician_credentials]
      - [physician_id, medicalSpecialty, physician_medical_specialty]

  IntroducePhysician:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 4
      description: 'Introduces a new physician in the domain, with its unique id, gamily name, given name, gender, and npi code'
    postconditions:
      classes:
        physician: Physician
      slots:
        physician_id: id
        physician_family_name: str
        physician_gender: gender
        physician_given_name: str
        physician_npi: npi
      triples:
      - [physician_id, type, Physician]
      - [physician_id, familyName, physician_family_name]
      - [physician_id, gender, physician_gender]
      - [physician_id, givenName, physician_given_name]
      - [physician_id, usNPI, physician_npi]

  HirePhysician:
    preconditions:
      classes:
        facility: Facility
      slots:
        facility_id: id
      cardinality: 2
      description: "Hires a new physicial for an existing medical facility. Provides the physician's id, given name, family name, gender, and npi, as well as the id and year fo the job placement for which the physician was hired"
    postconditions:
      classes:
        physician: Physician
      slots:
        physician_id: id
        job_placement_id: id
        physician_family_name: str
        physician_gender: gender
        physician_given_name: str
        physician_npi: npi
        job_placement_year: int
      triples:
      - [physician_id, type, Physician]
      - [job_placement_id, type, JobPlacement]
      - [physician_id, affiliatedHospital, facility_id]
      - [job_placement_id, placementFor, physician_id]
      - [job_placement_id, hasFacility, facility_id]
      - [physician_id, familyName, physician_family_name]
      - [physician_id, gender, physician_gender]
      - [physician_id, givenName, physician_given_name]
      - [physician_id, usNPI, physician_npi]
      - [job_placement_id, hasTimeReference, job_placement_year]

  ScoreZipCodeArea:
    preconditions:
      classes: 
        zip_code_area: ZipCodeArea
      slots:
        zip_code_area_id: id
      cardinality: 2
      description: 'Provides data about a missing ADI score for an existing zip code area for a certain year. In particular, the scoring id, score, and year are provided in the answer'
    postconditions:
      classes:
        adi_score: ADIScore
      slots:
        adi_score_id: id
        adi_score_score: score
        adi_score_year: int
      triples:
      - [adi_score_id, type, ADIScore]
      - [zipCodeArea_id, hasADIScore, adi_score_id]
      - [adi_score_id, nationalScore, adi_score_score]
      - [adi_score_id, scoredIn, adi_score_year]

  DefineZipCodeArea:
    preconditions:
      classes: {}
      slots: {}
      cardinality: 1
      description: "Defines a zip code area characterized by a zip code and an unique id (a sequence of 5 digits)"
    postconditions:
      classes: 
        zip_code_area: ZipCodeArea
      slots: 
        zip_code_area_id: id
        zip_code_area_code: zipCode
      triples: 
      - [zip_code_area_id, type, ZipCodeArea]
      - [zip_code_area_id, zipCodeValue, zip_code_area_code]

subclasses: []
precondition_slots: ['physician_id', 'zip_code_area_id', 'facility_id']
repeatable_terms: ['year', 'gender', 'score', 'number', 'credentials']

types:
  npi:
    type: 'str'
    pattern: "r'^d{10}$'"
    text: 'A string of 10 digits'
  gender:
    type: 'enum'
    options: ['male', 'female']
    text: "One option between 'male' and 'female'"
  credential:
    type: 'enum'
    options: ['MD', 'DO', 'MBBS']
    text: "One option between 'MD', 'DO', and 'MBBS'"
  zipCode:
    type: 'str'
    pattern: "r'^d{5}$'"
    text: 'A string of 5 digits'
  score:
    type: 'str'
    options: ['high', 'mid', 'low']
    text: "One option between 'high', 'mid', and 'low'"

instructions:
  AreaManager: 
    inst: ["DefineZipCodeArea", "IntroducePhysician", "ListADIScore"]
    cardinality: 9
  PhysicianManager: 
    inst: ["FindPhysicianPlacement", "ReportPhysicianStudies", "PhysicianSpecialty", "HirePhysician"]
    cardinality: 15